server.port=8080

# ===== MySQL Datasource =====
spring.datasource.url=jdbc:mysql://localhost:3306/question_bank?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== MyBatis =====
mybatis.mapper-locations=classpath*:mapper/**/*.xml
mybatis.type-aliases-package=com.xyz.question_bank_management_system.entity
mybatis.configuration.map-underscore-to-camel-case=true

# ===== Jackson =====
spring.jackson.time-zone=Asia/Shanghai
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss

# ===== JWT =====
app.jwt.secret=PLEASE_CHANGE_ME_TO_A_LONG_RANDOM_STRING
app.jwt.expire-seconds=7200

# ===== Qwen (DashScope OpenAI-compatible) =====
# base url: https://dashscope.aliyuncs.com/compatible-mode/v1
app.qwen.base-url=https://dashscope.aliyuncs.com/compatible-mode/v1
app.qwen.api-key=
app.qwen.api-key-file=${user.home}/Desktop/qwen_api.txt
app.qwen.model=qwen3.5-plus
app.qwen.temperature=0.2

# ===== Logging =====
logging.level.com.xyz.question_bank_management_system=debug

# ===== Dev init data (disable in production) =====
app.init.enabled=true
app.init.admin-username=admin
app.init.admin-password=admin123
